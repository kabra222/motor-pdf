name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Validate JavaScript syntax
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('app/static/index.html', 'utf8');
          const m = html.match(/<script>([\s\S]*?)<\/script>/);
          if (!m) { console.error('Nenhum <script> encontrado'); process.exit(1); }
          try { new Function(m[1]); console.log('  ✅ JavaScript OK'); }
          catch(e) { console.error('  ❌ JavaScript syntax error:', e.message); process.exit(1); }
          "

      - name: Lint with Ruff
        run: |
          uv run ruff check app/ tests/

      - name: Type check with mypy
        run: |
          uv run mypy app/ --ignore-missing-imports || true

      - name: Run tests
        run: |
          uv run pytest tests/ -v --tb=short

      - name: Run benchmarks
        if: github.ref == 'refs/heads/main'
        run: |
          uv run pytest tests/ -v --benchmark-only --benchmark-json=benchmark.json || true

      - name: Upload benchmark
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark.json
          path: benchmark.json
